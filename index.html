<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidewalk Formatter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-populate/browser/xlsx-populate.min.js"></script>
  <!-- JSZip: used to patch page setup XML directly in the xlsx after building -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:       #070a13;
      --dark-card:  #0d1220;
      --dark-mid:   #141c2e;
      --dark-border:#1e2d45;
      --rose:       #e11d48;
      --rose-glow:  rgba(225, 29, 72, 0.45);
      --cyan:       #3bffe8;
      --cyan-glow:  rgba(59, 255, 232, 0.4);
      --light:      #f1f5f9;
      --muted:      #475569;
      --muted-lt:   #64748b;
      --radius:     10px;
    }

    body {
      font-family: 'IBM Plex Sans', Arial, sans-serif;
      background-color: var(--dark);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      padding: 2.5rem 1.5rem 1.5rem;
      text-align: center;
      border-bottom: 1px solid var(--dark-border);
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -.02em;
      display: inline-block;
      text-decoration: underline 5px var(--rose);
      text-underline-offset: 6px;
    }
    header p {
      margin-top: .6rem;
      font-size: .85rem;
      color: var(--muted-lt);
      letter-spacing: .05em;
    }

    /* ── Main layout ── */
    main {
      flex: 1;
      width: 100%;
      max-width: 820px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Cards ── */
    .card {
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
    }
    .card-title {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted-lt);
      margin-bottom: 1rem;
    }

    /* ── Drop zone ── */
    #drop-zone {
      border: 2px dashed var(--dark-border);
      border-radius: var(--radius);
      padding: 2.75rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--cyan);
      background: rgba(59,255,232,.04);
    }
    #drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .drop-icon { font-size: 2.25rem; margin-bottom: .65rem; display: block; }
    .drop-main { font-size: 1rem; font-weight: 600; margin-bottom: .3rem; }
    .drop-sub  { font-size: .83rem; color: var(--muted-lt); }
    #file-name-display {
      display: none;
      margin-top: 1rem;
      background: rgba(59,255,232,.07);
      border: 1px solid rgba(59,255,232,.3);
      border-radius: 6px;
      padding: .55rem 1rem;
      font-size: .85rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--cyan);
      word-break: break-all;
    }

    /* ── Buttons ── */
    #process-btn {
      width: 100%;
      padding: .9rem 1.5rem;
      background: var(--rose);
      color: var(--light);
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -.02em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      box-shadow: 0 8px 20px var(--rose-glow), 0 0 80px -15px var(--rose);
      transition: transform .2s, box-shadow .2s;
    }
    #process-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px var(--rose-glow), 0 0 100px -10px var(--rose);
    }
    #process-btn:active:not(:disabled) { transform: translateY(0); }
    #process-btn:disabled {
      background: var(--muted);
      box-shadow: none;
      cursor: not-allowed;
    }

    #download-btn {
      width: 100%;
      padding: .9rem 1.5rem;
      background: transparent;
      color: var(--cyan);
      border: 2px solid var(--cyan);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -.02em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      box-shadow: 0 6px 18px var(--cyan-glow), 0 0 70px -20px var(--cyan);
      transition: transform .2s, box-shadow .2s, background .2s;
    }
    #download-btn:hover {
      background: rgba(59,255,232,.08);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px var(--cyan-glow), 0 0 100px -10px var(--cyan);
    }

    /* ── Status ── */
    #status-area { display: none; margin-top: 1rem; }
    .status-msg {
      display: flex;
      align-items: flex-start;
      gap: .6rem;
      padding: .8rem 1rem;
      border-radius: 7px;
      font-size: .88rem;
      line-height: 1.5;
    }
    .status-msg.success {
      background: rgba(51,204,51,.08);
      border: 1px solid rgba(51,204,51,.3);
      color: rgba(51,204,51,.9);
      font-style: italic;
    }
    .status-msg.error {
      background: rgba(225,29,72,.1);
      border: 1px solid rgba(225,29,72,.4);
      color: #fb7185;
    }
    .status-msg .icon { font-size: 1rem; flex-shrink: 0; margin-top: .1rem; }

    /* ── Footer ── */
    footer {
      width: 100%;
      padding: 1.25rem;
      text-align: center;
      border-top: 1px solid var(--dark-border);
      margin-top: auto;
    }
    footer p {
      font-size: .72rem;
      font-weight: 400;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .18em;
      user-select: none;
    }

    /* ── Spinner ── */
    .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>Sidewalk Formatter</h1>
  <p>NYCDOT · Sidewalk Management Unit</p>
</header>

<main>

  <!-- Upload -->
  <div class="card">
    <div id="drop-zone">
      <input type="file" id="file-input" accept=".xlsx" />
      <span class="drop-icon">📂</span>
      <div class="drop-main">Drop the NYCDOT Excel file here</div>
      <div class="drop-sub">or click to browse &nbsp;·&nbsp; .xlsx files only</div>
      <div id="file-name-display"></div>
    </div>
  </div>

  <!-- Format + status + download all in one card -->
  <div class="card">
    <button id="process-btn" disabled>
      <span id="btn-icon">⚙️</span>
      <span id="btn-text">Format Schedule</span>
    </button>
    <div id="status-area"></div>
    <button id="download-btn" style="display:none; margin-top: 1rem;">⬇️ &nbsp;Download Formatted Excel</button>
  </div>

</main>

<footer>
  <p>&copy; 2025 Pablo A. Bonilla &nbsp;||&nbsp; Sidewalk Formatter App</p>
</footer>

<script>
// ═══════════════════════════════════════════════════════════════
// 1. FORMATTING LOGIC
// ═══════════════════════════════════════════════════════════════

const WORD_ABBREVIATIONS = {
  "&": "and", "@": "", "And": "and", "At": "at",
  "Ave": "Ave", "Avenue": "Ave", "Between": "b/t",
  "Boulevard": "Blvd", "Drive": "Dr",
  "East": "E", "Eastbound": "E/B", "Expressway": "Expwy",
  "From": "", "Lane": "Ln",
  "North": "N", "Northbound": "N/B",
  "Of": "of", "On": "on",
  "Parkway": "Pkwy", "Place": "Pl", "Road": "Rd", "Roadway": "Rway",
  "South": "S", "Southbound": "S/B",
  "Street": "St", "Turnpike": "Tpke",
  "West": "W", "Westbound": "W/B",
};

const FORCE_UPPERCASE = new Set([
  "ne","nc","se","nw","sw","nb",
  "sec","nec","swc","nwc",
  "usa","ny","nycha","dpr","doe","ps",
]);

const IGNORE_PATTERNS = [
  /^HWPR2[012][QKRMX][A-Z0-9]*\s+/i,
  /^BLCOMPLNT\s+\d+/i,
  /^HWS\d+[QR]/i,
  /^HWP\d+[QRX]/i,
];

const SECTION_HEADERS = [
  "Sidewalk Contracts:",
  "Curb Contracts:",
  "Bus Pad Contracts:",
  "Pedestrian Ramp Upgrade Contracts:",
  "Pedestrian Ramp New Installation Contracts:",
];

const PREPOSITIONS = new Set(["of","the","and","at","on","in","for","to","with","by","from"]);

function shouldIgnore(text) {
  return IGNORE_PATTERNS.some(p => p.test(String(text)));
}

function capWord(w) {
  if (!w) return w;
  const isUniform = (w === w.toUpperCase() || w === w.toLowerCase());
  if (isUniform) return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
  return w.split('-').map(p => p.charAt(0).toUpperCase() + p.slice(1).toLowerCase()).join('-');
}

function formatPart(part) {
  if (!part) return part;
  const cap = part.trim().charAt(0).toUpperCase() + part.trim().slice(1).toLowerCase();
  const r = WORD_ABBREVIATIONS[cap];
  return r !== undefined ? r : cap;
}

function formatLocation(rawText) {
  if (!rawText || rawText === 'null' || rawText === 'undefined') return rawText;
  let line = String(rawText).trim();
  if (!line) return line;
  if (shouldIgnore(line)) return null;

  line = line.replace(/"/g, '');
  line = line.replace(/\./g, '');
  line = line.replace(/\s*\/\s*/g, '/');

  const words = line.split(/\s+/);
  const out = [];

  for (let i = 0; i < words.length; i++) {
    const word     = words[i];
    const nextWord = words[i + 1] || null;

    const leadM  = word.match(/^[(\-]+/);
    const trailM = word.match(/[.,)\-:;]+$/);
    const leadStr  = leadM  ? leadM[0]  : '';
    const trailStr = trailM ? trailM[0] : '';
    const cleaned  = word.slice(leadStr.length, trailStr ? word.length - trailStr.length : undefined);
    const cap      = capWord(cleaned);

    if (cleaned.includes('/')) {
      const rebuilt = cleaned.split('/').map(formatPart).join('/');
      out.push(leadStr + rebuilt + trailStr);
      continue;
    }

    const nwBare = nextWord ? nextWord.replace(/[,.;: )]/g, '') : '';
    if ((cap === 'Avenue' || cap === 'Ave') && /^[A-Za-z]$/.test(nwBare)) {
      out.push(leadStr + 'Avenue' + trailStr);
      continue;
    }

    const nwClean = nextWord ? nextWord.replace(/[/:,]/g, '') : '';
    if (cap === 'East' && nwClean.toLowerCase().startsWith('end')) {
      out.push(leadStr + 'East' + trailStr);
      continue;
    }

    if (['East','West','North','South'].includes(cap) && cap in WORD_ABBREVIATIONS) {
      const inParens   = leadStr.includes('(');
      const nwStripped = nextWord ? nextWord.replace(/[/:,)( ]/g, '') : '';
      const nwLower    = nwStripped.toLowerCase();
      const nwIsDigit  = nextWord && /^\d/.test(nextWord);
      const nwIsPrep   = !nwLower || PREPOSITIONS.has(nwLower);
      if (inParens || nwIsDigit || nwIsPrep) {
        out.push(leadStr + WORD_ABBREVIATIONS[cap] + trailStr);
      } else {
        out.push(leadStr + cap + trailStr);
      }
      continue;
    }

    const abbr = WORD_ABBREVIATIONS[cap];
    if (abbr === '' && cap in WORD_ABBREVIATIONS) continue;
    out.push(leadStr + (abbr !== undefined ? abbr : cap) + trailStr);
  }

  line = out.join(' ').trim();
  line = line.replace(/\s+/g,       ' ');
  line = line.replace(/--+/g,       ' - ');
  line = line.replace(/(\d)-(\d)/g, '$1 - $2');
  line = line.replace(/\s+-\s+/g,   ' - ');
  line = line.replace(/(\w)- /g,    '$1 - ');
  line = line.replace(/\s*\//g,     '/');
  line = line.replace(/\/\s*/g,     '/');
  line = line.trim();

  for (const token of FORCE_UPPERCASE) {
    const re = new RegExp(`\\b${token}(?=\\b|\\d)`, 'gi');
    line = line.replace(re, token.toUpperCase());
  }

  return line;
}

// ═══════════════════════════════════════════════════════════════
// 2. PARSE RAW FILE
// ═══════════════════════════════════════════════════════════════

function extractDateString(rows) {
  for (let i = 0; i < Math.min(10, rows.length); i++) {
    const val = String(rows[i][0] || '').trim();
    if (/\d{4}/.test(val) && (/week of/i.test(val) || / to /i.test(val))) {
      let d = val.replace(/(\d+)(st|nd|rd|th)/gi, '$1');
      d = d.replace(/^week of\s*/i, '').trim();
      return d + ' (Weather Permitting)';
    }
  }
  return 'Construction Schedule (Weather Permitting)';
}

function parseRawRows(rows) {
  const dateStr  = extractDateString(rows);
  const sections = [];
  let current    = null;

  for (const row of rows) {
    const colA = String(row[0] || '').trim();
    const colB = String(row[1] || '').trim();
    const colC = row[2];
    const colD = String(row[3] || '').trim();

    if (SECTION_HEADERS.includes(colA)) {
      current = { header: colA, twoRowHdr: false, rows: [] };
      sections.push(current);
      continue;
    }
    if (!current) continue;

    if (colA === 'Borough' && colB === '')             { current.twoRowHdr = true;  continue; }
    if (colA === 'Borough' && colB === 'Contract No.') { current.twoRowHdr = false; continue; }
    if (colB === 'Contract No.' && colA === '')        continue;

    if (colA.startsWith('*') || colB.startsWith('*')) continue;
    if (!colA && !colB && (colC === null || colC === undefined || colC === '') && !colD) continue;

    let cb = null;
    if (colC !== null && colC !== undefined && colC !== '') {
      const n = parseInt(String(colC), 10);
      cb = isNaN(n) ? colC : n;
    }

    current.rows.push([colA || null, colB || null, cb, colD || null]);
  }

  return { dateStr, sections };
}

// ═══════════════════════════════════════════════════════════════
// 3. BUILD OUTPUT WORKBOOK
//    - Arial font, borders on ALL 4 columns including empty cells
//    - Both twoRowHdr rows get full 4-column borders
//    - Wrap text, vertical center, correct column widths
// ═══════════════════════════════════════════════════════════════

async function buildWorkbook(dateStr, sections) {
  const wb = await XlsxPopulate.fromBlankAsync();
  const ws = wb.sheet(0);

  ws.column('A').width(52.86);
  ws.column('B').width(26);
  ws.column('C').width(20);
  ws.column('D').width(68);

  const BORDER = { top: 'medium', bottom: 'medium', left: 'medium', right: 'medium' };

  let r = 1;

  // Plain cell — title block rows, no border, size 11
  function plainCell(row, col, val, bold = false) {
    const cell = ws.cell(row, col);
    if (val !== null && val !== undefined) cell.value(val);
    cell.style({ fontFamily: 'Arial', fontSize: 11, bold, wrapText: true, verticalAlignment: 'center' });
  }

  // Section header cell — size 12, bold, no border
  function sectionCell(row, col, val) {
    const cell = ws.cell(row, col);
    if (val !== null && val !== undefined) cell.value(val);
    cell.style({ fontFamily: 'Arial', fontSize: 12, bold: true, wrapText: true, verticalAlignment: 'center' });
  }

  // Bordered cell — always applies border even if value is null/empty
  function borderedCell(row, col, val, bold = false, center = false) {
    const cell = ws.cell(row, col);
    if (val !== null && val !== undefined) cell.value(val);
    cell.style({
      fontFamily: 'Arial',
      fontSize: 11,
      bold,
      border: BORDER,
      wrapText: true,
      verticalAlignment: 'center',
      horizontalAlignment: center ? 'center' : 'left',
    });
  }

  // Title block — merged rows, no borders
  ws.range(r, 1, r, 4).merged(true); plainCell(r++, 1, 'Sidewalk Management Unit');
  ws.range(r, 1, r, 4).merged(true); plainCell(r++, 1, 'Construction and Inspection Schedule');
  ws.range(r, 1, r, 4).merged(true); plainCell(r++, 1, dateStr);
  r++; // blank

  for (const sec of sections) {
    // Section label row — merged, bold, no border
    ws.range(r, 1, r, 4).merged(true);
    ws.row(r).height(15.75);
    sectionCell(r++, 1, sec.header);

    // ── Column header rows ────────────────────────────────
    // ALL 4 columns get a border — empty cells included.
    if (sec.twoRowHdr) {
      // Row A: "Borough" in col 1, cols 2-4 empty but bordered
      borderedCell(r, 1, 'Borough', true);
      borderedCell(r, 2, null,      false);
      borderedCell(r, 3, null,      false, true);
      borderedCell(r, 4, null,      false);
      r++;
      // Row B: col 1 empty, then Contract No. / CB / Location — all bold
      borderedCell(r, 1, null,           false);
      borderedCell(r, 2, 'Contract No.', true);
      borderedCell(r, 3, 'CB',           true, true);
      borderedCell(r, 4, 'Location',     true);
      r++;
    } else {
      // Single header row — all 4 cols bordered, all labels bold
      borderedCell(r, 1, 'Borough',      true);
      borderedCell(r, 2, 'Contract No.', true);
      borderedCell(r, 3, 'CB',           true, true);
      borderedCell(r, 4, null,           false);
      r++;
    }

    // ── Data rows — all 4 cols always bordered ─────────────
    for (const [borough, contract, cb, location] of sec.rows) {
      let loc = location;
      if (loc) {
        if (shouldIgnore(loc)) continue;
        loc = formatLocation(loc);
        if (!loc) continue;
      }
      borderedCell(r, 1, borough,  !!borough); // bold when borough name present
      borderedCell(r, 2, contract, false);
      borderedCell(r, 3, cb,       false, true);
      borderedCell(r, 4, loc,      false);
      r++;
    }

    r++; // blank row between sections
  }

  return wb;
}

// ═══════════════════════════════════════════════════════════════
// 4. FIX PAGE SETUP VIA RAW XML (works in all xlsx-populate versions)
//    xlsx-populate's pageSetup() API doesn't exist in the browser
//    bundle, so we patch the sheet XML directly inside the zip.
//    This sets: landscape orientation, fit to 1 page wide, letter size,
//    and tight margins — so PDF export never splits columns across pages.
// ═══════════════════════════════════════════════════════════════

async function applyPageSetup(xlsxData) {
  const zip = await JSZip.loadAsync(xlsxData);
  const path = 'xl/worksheets/sheet1.xml';
  let xml = await zip.file(path).async('string');

  // 1. Enable "Fit to Page" via <sheetPr> — required alongside fitToWidth/Height
  if (/<sheetPr\s*\/>/.test(xml)) {
    xml = xml.replace(/<sheetPr\s*\/>/, '<sheetPr><pageSetUpPr fitToPage="1"/></sheetPr>');
  } else if (/<sheetPr[\s>]/.test(xml)) {
    // sheetPr exists but may not have pageSetUpPr — inject it inside
    xml = xml.replace(/<sheetPr([^>]*)>/, '<sheetPr$1><pageSetUpPr fitToPage="1"/>');
  } else {
    // No sheetPr at all — add one right after the <worksheet ...> opening tag
    xml = xml.replace(/(<worksheet[^>]*>)/, '$1<sheetPr><pageSetUpPr fitToPage="1"/></sheetPr>');
  }

  // 2. Add / replace <pageMargins>
  const margins = 'left="0.5" right="0.5" top="0.75" bottom="0.75" header="0.3" footer="0.3"';
  if (xml.includes('<pageMargins')) {
    xml = xml.replace(/<pageMargins[^/]*\/>/, `<pageMargins ${margins}/>`);
  } else {
    xml = xml.replace('</worksheet>', `<pageMargins ${margins}/></worksheet>`);
  }

  // 3. Add / replace <pageSetup> — landscape, letter paper, fit 1 wide, unlimited tall
  const setup = 'paperSize="1" orientation="landscape" fitToWidth="1" fitToHeight="0"';
  if (xml.includes('<pageSetup')) {
    xml = xml.replace(/<pageSetup[^/]*\/>/, `<pageSetup ${setup}/>`);
  } else {
    xml = xml.replace('</worksheet>', `<pageSetup ${setup}/></worksheet>`);
  }

  zip.file(path, xml);
  return zip.generateAsync({ type: 'arraybuffer', compression: 'DEFLATE' });
}

// ═══════════════════════════════════════════════════════════════
// 5. UI
// ═══════════════════════════════════════════════════════════════

let selectedFile = null;
let downloadBlob = null;
let outputName   = 'sidewalksch_formatted.xlsx';

const dropZone    = document.getElementById('drop-zone');
const fileInput   = document.getElementById('file-input');
const fileDisplay = document.getElementById('file-name-display');
const processBtn  = document.getElementById('process-btn');
const btnText     = document.getElementById('btn-text');
const statusArea  = document.getElementById('status-area');
const downloadBtn = document.getElementById('download-btn');

['dragenter','dragover'].forEach(evt =>
  dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.add('drag-over'); })
);
['dragleave','drop'].forEach(evt =>
  dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.remove('drag-over'); })
);
dropZone.addEventListener('drop', e => {
  const file = e.dataTransfer.files[0];
  if (file) setFile(file);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) setFile(fileInput.files[0]);
});

function setFile(file) {
  if (!file.name.endsWith('.xlsx')) {
    showStatus('error', '⚠️', 'Please select an .xlsx file.');
    return;
  }
  selectedFile = file;
  fileDisplay.textContent = '📄  ' + file.name;
  fileDisplay.style.display = 'block';
  processBtn.disabled = false;
  downloadBtn.style.display = 'none';
  statusArea.style.display  = 'none';
  downloadBlob = null;
}

function showStatus(type, icon, msg) {
  statusArea.style.display = 'block';
  statusArea.innerHTML = `<div class="status-msg ${type}"><span class="icon">${icon}</span><span>${msg}</span></div>`;
}

function setProcessing(on) {
  processBtn.disabled = on;
  if (on) {
    document.getElementById('btn-icon').outerHTML = '<span class="spinner" id="btn-icon"></span>';
    btnText.textContent = 'Formatting…';
  } else {
    const s = document.querySelector('.spinner');
    if (s) s.outerHTML = '<span id="btn-icon">⚙️</span>';
    btnText.textContent = 'Format Schedule';
  }
}

processBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  setProcessing(true);
  statusArea.style.display  = 'none';
  downloadBtn.style.display = 'none';

  try {
    const arrayBuffer = await selectedFile.arrayBuffer();
    const wb    = XLSX.read(arrayBuffer, { type: 'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows  = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null });

    const { dateStr, sections } = parseRawRows(rows);
    if (!sections.length) throw new Error('No section headers found. Is this the correct NYCDOT schedule file?');

    const outWb     = await buildWorkbook(dateStr, sections);
    const rawData   = await outWb.outputAsync();
    const fixedData = await applyPageSetup(rawData);
    downloadBlob    = new Blob([fixedData], {
      type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
    });

    const totalRows = sections.reduce((s, sec) => s + sec.rows.length, 0);
    showStatus('success', '✅',
      `Formatting complete! &nbsp;<strong>${dateStr}</strong> — ${sections.length} sections, ${totalRows} rows.`);
    downloadBtn.style.display = 'flex';

  } catch (err) {
    console.error(err);
    showStatus('error', '❌', 'Something went wrong: ' + err.message);
  } finally {
    setProcessing(false);
  }
});

downloadBtn.addEventListener('click', () => {
  if (!downloadBlob) return;
  const url = URL.createObjectURL(downloadBlob);
  const a   = document.createElement('a');
  a.href     = url;
  a.download = outputName;
  a.click();
  URL.revokeObjectURL(url);
});
</script>
